name: Build OnePlus 11 SukiSU Ultra Base

on:
  workflow_dispatch:
    inputs:
      CPU:
        type: choice
        description: "SoC branch"
        required: true
        default: sm8550
        options:
          - sm8550

      FEIL:
        type: choice
        description: "OnePlus manifest xml, PHB110 Android 16 should use oneplus_11_b"
        required: true
        default: oneplus_11_b
        options:
          - oneplus_11_b
          - oneplus_11_v

      CPUD:
        type: choice
        description: "Processor codename"
        required: true
        default: kalama
        options:
          - kalama

      ANDROID_VERSION:
        type: choice
        description: "Kernel Android KMI version, your kernel is android13"
        required: true
        default: android13
        options:
          - android13

      KERNEL_VERSION:
        type: choice
        description: "Kernel version"
        required: true
        default: "5.15"
        options:
          - "5.15"

      BUILD_METHOD:
        type: choice
        description: "Build method"
        required: true
        default: gki
        options:
          - gki

      EXPECTED_KERNEL_VERSION:
        type: string
        description: "Expected Linux version string fragment"
        required: true
        default: "5.15.180"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            git \
            curl \
            jq \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            build-essential \
            rsync \
            unzip \
            zip \
            binutils

      - name: Show selected inputs
        run: |
          echo "CPU: ${{ github.event.inputs.CPU }}"
          echo "FEIL: ${{ github.event.inputs.FEIL }}"
          echo "CPUD: ${{ github.event.inputs.CPUD }}"
          echo "ANDROID_VERSION: ${{ github.event.inputs.ANDROID_VERSION }}"
          echo "KERNEL_VERSION: ${{ github.event.inputs.KERNEL_VERSION }}"
          echo "BUILD_METHOD: ${{ github.event.inputs.BUILD_METHOD }}"
          echo "EXPECTED_KERNEL_VERSION: ${{ github.event.inputs.EXPECTED_KERNEL_VERSION }}"

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          set -euxo pipefail

          mkdir -p kernel_workspace
          cd kernel_workspace

          repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.CPU }} \
            -m ${{ github.event.inputs.FEIL }}.xml \
            --depth=1

          repo sync -c --no-tags --no-clone-bundle --optimized-fetch -j"$(nproc --all)"

          if [ -e kernel_platform/common/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' \
              kernel_platform/common/BUILD.bazel
          fi

          if [ -e kernel_platform/msm-kernel/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' \
              kernel_platform/msm-kernel/BUILD.bazel
          fi

          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true

      - name: Show source revision
        run: |
          set -euxo pipefail

          cd kernel_workspace/kernel_platform

          echo "===== common HEAD ====="
          cd common
          git log -1 --oneline || true
          grep -nE "^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)" Makefile || true

          cd ../msm-kernel
          echo "===== msm-kernel HEAD ====="
          git log -1 --oneline || true
          grep -nE "^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)" Makefile || true

      - name: Force remove -dirty suffix
        run: |
          set -euxo pipefail

          cd kernel_workspace/kernel_platform

          for f in \
            common/scripts/setlocalversion \
            msm-kernel/scripts/setlocalversion \
            external/dtc/scripts/setlocalversion
          do
            if [ -f "$f" ]; then
              sed -i 's/ -dirty//g' "$f"
              sed -i 's/-dirty//g' "$f"
            fi
          done

          if [ -f common/scripts/setlocalversion ]; then
            grep -q 'res=$(echo "$res" | sed '\''s/-dirty//g'\'')' common/scripts/setlocalversion || \
              sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' common/scripts/setlocalversion
          fi

          git add -A
          git diff --cached --quiet || git commit -m "Force remove dirty suffix"

      - name: Add SukiSU Ultra
        run: |
          set -euxo pipefail

          cd kernel_workspace/kernel_platform

          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

          cd ./KernelSU

          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count main) "+" 10606)
          echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"
          export KSU_VERSION="$KSU_VERSION"

          sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile || true

          echo "SukiSU Ultra version: $KSU_VERSION"

      - name: Add minimal SukiSU config
        run: |
          set -euxo pipefail

          cd kernel_workspace/kernel_platform

          GKI_DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
          OPLUS_GKI_CONFIG="./msm-kernel/arch/arm64/configs/${{ github.event.inputs.CPUD }}-GKI.config"

          set_config_y() {
            local file="$1"
            local key="$2"

            [ -f "$file" ] || return 0

            sed -i -E "/^${key}=.*/d" "$file"
            sed -i -E "/^# ${key} is not set/d" "$file"
            echo "${key}=y" >> "$file"
          }

          set_config_n() {
            local file="$1"
            local key="$2"

            [ -f "$file" ] || return 0

            sed -i -E "/^${key}=.*/d" "$file"
            sed -i -E "/^# ${key} is not set/d" "$file"
            echo "# ${key} is not set" >> "$file"
          }

          remove_config_prefix() {
            local file="$1"
            local prefix="$2"

            [ -f "$file" ] || return 0

            sed -i -E "/^${prefix}.*/d" "$file"
            sed -i -E "/^# ${prefix}.* is not set/d" "$file"
          }

          for file in "$GKI_DEFCONFIG" "$OPLUS_GKI_CONFIG"; do
            [ -f "$file" ] || continue

            echo "Patching config: $file"

            # Base SukiSU only
            set_config_y "$file" "CONFIG_KSU"

            # GKI should use KPROBES hook, not manual hook
            set_config_y "$file" "CONFIG_KPROBES"
            set_config_n "$file" "CONFIG_KSU_MANUAL_HOOK"

            # Disable KPM completely for boot test
            set_config_n "$file" "CONFIG_KPM"

            # Disable SUSFS completely for boot test
            remove_config_prefix "$file" "CONFIG_KSU_SUSFS"
            echo "# CONFIG_KSU_SUSFS is not set" >> "$file"
          done

          # Avoid strict defconfig check failures caused by appended config
          sed -i 's/check_defconfig//' ./common/build.config.gki || true

          echo "===== gki_defconfig KSU/KPM/SUSFS summary ====="
          grep -nE "CONFIG_KSU|CONFIG_KPM|CONFIG_KPROBES" "$GKI_DEFCONFIG" || true

          if [ -f "$OPLUS_GKI_CONFIG" ]; then
            echo "===== ${OPLUS_GKI_CONFIG} KSU/KPM/SUSFS summary ====="
            grep -nE "CONFIG_KSU|CONFIG_KPM|CONFIG_KPROBES" "$OPLUS_GKI_CONFIG" || true
          fi

      - name: Build kernel
        run: |
          set -euxo pipefail

          cd kernel_workspace

          mkdir -p out/target/product/${{ github.event.inputs.CPUD }}

          LTO=thin \
          SYSTEM_DLKM_RE_SIGN=0 \
          BUILD_SYSTEM_DLKM=0 \
          KMI_SYMBOL_LIST_STRICT_MODE=0 \
          ./kernel_platform/oplus/build/oplus_build_kernel.sh \
            ${{ github.event.inputs.CPUD }} \
            ${{ github.event.inputs.BUILD_METHOD }} \
            2>&1 | tee build_kernel.log

          echo "===== grep build errors ====="
          grep -niE "error:|failed|fatal|no such file|no rule to make target|ninja failed|stop\.|cp:|dtb_staging|needs 2 arguments|implicit declaration" build_kernel.log || true

          echo "===== final .config KSU summary ====="
          find ./kernel_platform/out -type f -name ".config" -print -exec grep -nE "CONFIG_KSU|CONFIG_KPM|CONFIG_KPROBES" {} \; || true

          echo "===== dist files ====="
          find ./kernel_platform/out -path "*/dist/*" -type f -print || true

          echo "===== Image / boot outputs ====="
          find ./kernel_platform -type f \( \
            -name "Image" -o \
            -name "Image.gz" -o \
            -name "Image.lz4" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "dtbo.img" \
          \) -print -exec ls -lh {} \; || true

      - name: Make AnyKernel3
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE"

          git clone https://github.com/Numbersf/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git

          echo "===== Searching Image ====="

          image_path=""

          # 1. Prefer dist/Image
          image_path="$(find kernel_workspace -type f -path "*/dist/Image" | head -n 1 || true)"

          # 2. Then arm64 boot Image
          if [ -z "$image_path" ]; then
            image_path="$(find kernel_workspace -type f -path "*/arch/arm64/boot/Image" | head -n 1 || true)"
          fi

          # 3. Then Image under kernel_platform/out
          if [ -z "$image_path" ]; then
            image_path="$(find kernel_workspace/kernel_platform/out -type f -name "Image" 2>/dev/null | head -n 1 || true)"
          fi

          # 4. Then Image under kernel_platform/common
          if [ -z "$image_path" ]; then
            image_path="$(find kernel_workspace/kernel_platform/common -type f -name "Image" 2>/dev/null | head -n 1 || true)"
          fi

          # 5. Then any Image under whole kernel_workspace
          if [ -z "$image_path" ]; then
            image_path="$(find kernel_workspace -type f -name "Image" 2>/dev/null | head -n 1 || true)"
          fi

          echo "image_path=$image_path"

          if [ -z "$image_path" ] || [ ! -f "$image_path" ]; then
            echo "ERROR: Image not found"
            echo "===== Debug: all Image-like files ====="
            find kernel_workspace -type f \( \
              -name "Image" -o \
              -name "Image.gz" -o \
              -name "Image.lz4" -o \
              -name "vmlinux" -o \
              -name "boot.img" \
            \) -print -exec ls -lh {} \; || true
            exit 1
          fi

          echo "Using Image: $image_path"
          ls -lh "$image_path"

          cp "$image_path" ./AnyKernel3/Image

          echo "IMAGE_PATH=$image_path" >> "$GITHUB_ENV"

          echo "===== AnyKernel3 content ====="
          ls -lh ./AnyKernel3/

      - name: Verify Image Linux version
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE"

          echo "===== Linux version strings in AnyKernel3/Image ====="
          strings ./AnyKernel3/Image | grep -i "Linux version" | head -n 20 || true

          VERSION_LINE="$(strings ./AnyKernel3/Image | grep -i "Linux version 5\." | head -n 1 || true)"
          echo "VERSION_LINE=$VERSION_LINE"

          if [ -z "$VERSION_LINE" ]; then
            echo "ERROR: Cannot find Linux version string in Image"
            exit 1
          fi

          if ! echo "$VERSION_LINE" | grep -q "${{ github.event.inputs.EXPECTED_KERNEL_VERSION }}"; then
            echo "ERROR: Built Image version does not match expected version."
            echo "Expected fragment: ${{ github.event.inputs.EXPECTED_KERNEL_VERSION }}"
            echo "Actual: $VERSION_LINE"
            echo "Do NOT flash this Image."
            exit 1
          fi

          echo "Image version check passed."

      - name: Remove suffix from FEIL
        id: feil_clean
        run: |
          clean_feil="${{ github.event.inputs.FEIL }}"
          clean_feil="${clean_feil%_v}"
          clean_feil="${clean_feil%_u}"
          clean_feil="${clean_feil%_b}"
          echo "value=$clean_feil" >> "$GITHUB_OUTPUT"

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_SukiSUUltra_BASE_${{ env.KSUVER }}_${{ steps.feil_clean.outputs.value }}_${{ github.event.inputs.ANDROID_VERSION }}_${{ github.event.inputs.KERNEL_VERSION }}_${{ github.event.inputs.EXPECTED_KERNEL_VERSION }}
          path: ./AnyKernel3/*
